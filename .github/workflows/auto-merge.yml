name: Auto-Merge on Success

on:
  workflow_run:
    workflows: ["CI - Run Tests and Generate Reports"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - name: Resolve PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const headSha = run.head_sha;
            const headBranch = run.head_branch;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
            });

            const pr = prs.find((item) => item.head.sha === headSha) || prs[0];
            if (!pr) {
              core.setFailed(`No open PR found for branch ${headBranch} @ ${headSha}`);
              return;
            }
            if (pr.draft) {
              core.setFailed(`PR #${pr.number} is a draft; skipping auto-merge`);
              return;
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_sha', pr.head.sha);
            core.setOutput('pr_title', pr.title);

      - name: Verify required checks
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const prSha = '${{ steps.pr.outputs.pr_sha }}';
            const required = [
              'Lint Code',
              'Run API Tests',
              'Run E2E Tests',
              'Check Test Status',
            ];

            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: prSha,
              per_page: 100,
            });

            const runs = data.check_runs || [];
            let allPassed = true;
            for (const name of required) {
              const check = runs.find((item) => item.name === name);
              if (!check) {
                console.log(`Missing check: ${name}`);
                allPassed = false;
                continue;
              }
              console.log(`${name}: ${check.status}/${check.conclusion}`);
              if (check.conclusion !== 'success') {
                allPassed = false;
              }
            }

            core.setOutput('all_passed', String(allPassed));
            if (!allPassed) {
              core.setFailed('Required CI checks are not all green');
            }

      - name: Merge pull request
        if: steps.checks.outputs.all_passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const prSha = '${{ steps.pr.outputs.pr_sha }}';
            const prTitle = ${{ toJSON(steps.pr.outputs.pr_title) }};

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'merge',
              sha: prSha,
              commit_title: `Auto-merge: ${prTitle} (#${prNumber})`,
              commit_message: `Merged automatically after CI success.\n\nPR: #${prNumber}\nCommit: ${prSha}`,
            });

      - name: Comment on PR
        if: always() && steps.pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const passed = '${{ steps.checks.outputs.all_passed }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}`;
            const body = passed
              ? 'All required CI checks passed. This PR has been automatically merged.'
              : `Auto-merge skipped because required CI checks are not green. See the [CI run](${runUrl}).`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
