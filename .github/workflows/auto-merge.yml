name: Auto-Merge on Success

on:
  workflow_run:
    workflows: ["CI - Run Tests and Generate Reports"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    # Always run so the job is not shown as "skipped" with no explanation.
    # Auto-merge only applies when the triggering CI run was a same-repo pull_request.
    outputs:
      should_merge: ${{ steps.gate.outputs.should_merge }}
      reason: ${{ steps.gate.outputs.reason }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      merge_attempted: ${{ steps.merge-summary.outputs.merge_attempted }}
    steps:
      - name: Gate — only merge after successful PR CI
        id: gate
        run: |
          EVENT="${{ github.event.workflow_run.event }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          HEAD_REPO="${{ github.event.workflow_run.head_repository.full_name }}"
          THIS_REPO="${{ github.repository }}"

          echo "workflow_run.event=${EVENT}"
          echo "workflow_run.conclusion=${CONCLUSION}"
          echo "head_repository=${HEAD_REPO}"

          if [ "${EVENT}" != "pull_request" ]; then
            echo "should_merge=false" >> "${GITHUB_OUTPUT}"
            echo "reason=CI was triggered by '${EVENT}' (not pull_request). Auto-merge only runs after PR CI — push-to-main / after-merge runs are expected to no-op." >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${CONCLUSION}" != "success" ]; then
            echo "should_merge=false" >> "${GITHUB_OUTPUT}"
            echo "reason=CI conclusion was '${CONCLUSION}' (need success)." >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${HEAD_REPO}" != "${THIS_REPO}" ]; then
            echo "should_merge=false" >> "${GITHUB_OUTPUT}"
            echo "reason=Fork PR (${HEAD_REPO}); auto-merge is same-repo only." >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "should_merge=true" >> "${GITHUB_OUTPUT}"
          echo "reason=PR CI succeeded; proceeding to merge checks." >> "${GITHUB_OUTPUT}"

      - name: Explain no-op
        if: steps.gate.outputs.should_merge != 'true'
        run: |
          echo "::notice::Auto-merge not applicable — ${{ steps.gate.outputs.reason }}"
          echo "This is not a failure. Report email is sent by the CI Merge Reports job (and Pre-Merge), not by Auto-Merge."

      - name: Resolve PR
        if: steps.gate.outputs.should_merge == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const headSha = run.head_sha;
            const headBranch = run.head_branch;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
            });

            const pr = prs.find((item) => item.head.sha === headSha) || prs[0];
            if (!pr) {
              core.setFailed(`No open PR found for branch ${headBranch} @ ${headSha}`);
              return;
            }
            if (pr.draft) {
              core.setFailed(`PR #${pr.number} is a draft; skipping auto-merge`);
              return;
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_sha', pr.head.sha);
            core.setOutput('pr_title', pr.title);

      - name: Verify required checks
        if: steps.gate.outputs.should_merge == 'true'
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const required = [
              'Lint Code',
              'Run API Tests',
              'Run E2E Article + Tag Tests',
              'Run E2E Settings Tests',
              'Merge Reports',
              'Summarize Run',
            ];

            const { data } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const jobs = data.jobs || [];
            let allPassed = true;
            for (const name of required) {
              const job = jobs.find((item) => item.name === name);
              if (!job) {
                console.log(`Missing job: ${name}`);
                allPassed = false;
                continue;
              }
              console.log(`${name}: ${job.status}/${job.conclusion}`);
              if (job.conclusion !== 'success') {
                allPassed = false;
              }
            }

            core.setOutput('all_passed', String(allPassed));
            if (!allPassed) {
              core.setFailed('Required CI checks are not all green');
            }

      - name: Merge pull request
        if: steps.gate.outputs.should_merge == 'true' && steps.checks.outputs.all_passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const prSha = '${{ steps.pr.outputs.pr_sha }}';
            const prTitle = ${{ toJSON(steps.pr.outputs.pr_title) }};

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'merge',
              sha: prSha,
              commit_title: `Auto-merge: ${prTitle} (#${prNumber})`,
              commit_message: `Merged automatically after CI success.\n\nPR: #${prNumber}\nCommit: ${prSha}`,
            });

      - name: Comment on PR
        if: always() && steps.gate.outputs.should_merge == 'true' && steps.pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const passed = '${{ steps.checks.outputs.all_passed }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}`;
            const body = passed
              ? 'All required CI checks passed. This PR has been automatically merged.'
              : `Auto-merge skipped because required CI checks are not green. See the [CI run](${runUrl}).`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Record merge outcome
        if: always()
        id: merge-summary
        run: |
          SHOULD="${{ steps.gate.outputs.should_merge }}"
          PASSED="${{ steps.checks.outputs.all_passed }}"
          if [ "${SHOULD}" = "true" ] && [ "${PASSED}" = "true" ]; then
            echo "merge_attempted=true" >> "${GITHUB_OUTPUT}"
          else
            echo "merge_attempted=false" >> "${GITHUB_OUTPUT}"
          fi

  email-auto-merge-result:
    name: Email Auto-Merge Result
    runs-on: ubuntu-latest
    needs: [auto-merge]
    if: always()
    env:
      NODE_VERSION: "24"
      ENV_FILE: ${{ secrets.ENV_FILE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Write .env from GitHub secret
        run: bash .github/scripts/write-env-from-secret.sh

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Download the consolidated reports ZIP produced by the triggering CI run.
      # The ZIP is treated as a data attachment only — its contents are never
      # executed.  GitHub's security guidance for untrusted artifacts from
      # another workflow run warns against executing downloaded content:
      # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#cross-workflow-artifact-theft
      - name: Download consolidated reports ZIP from CI run
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: consolidated-reports-zip
          path: /tmp/auto-merge-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email
        if: always()
        continue-on-error: true
        env:
          # Point the workflow URL in the email body to the triggering CI run
          # so recipients can navigate directly to test results.
          GITHUB_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_REF_NAME: ${{ github.event.workflow_run.head_branch }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: auto-merge-${{ github.run_id }}-${{ github.run_attempt }}
          EMAIL_REPORT_STATUS: >-
            ci-conclusion=${{ github.event.workflow_run.conclusion }};
            auto-merge=${{ needs.auto-merge.result }};
            merge-attempted=${{ needs.auto-merge.outputs.merge_attempted }}
          REPORTS_ZIP_PATH: /tmp/auto-merge-reports/consolidated-reports.zip
        run: |
          if [ ! -f src/config/environment/.env ]; then
            echo "No .env from ENV_FILE secret — cannot email reports."
            echo "Add repository secret ENV_FILE with full .env contents (including SMTP_PASS)."
            exit 0
          fi
          npm run reports:email
