name: Pre-Merge Check

on:
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: pre-merge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  ENVIRONMENT: DEV
  DYNAMIC_USER: "true"
  PARALLEL: "true"
  WORKERS: "2"
  HEADLESS: "true"
  OPEN_REPORTS: "false"
  CI: "true"
  DEV_BASEURL: https://conduit.bondaracademy.com
  DEV_API_BASE_URL: https://conduit-api.bondaracademy.com

jobs:
  pre-merge:
    name: Pre-Merge Smoke
    runs-on: ubuntu-latest
    env:
      ENV_FILE: ${{ secrets.ENV_FILE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env from GitHub secret
        run: bash .github/scripts/write-env-from-secret.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run API smoke
        id: api-smoke
        run: npm run test:dev:api
        continue-on-error: true

      - name: Generate Allure report (if results exist)
        if: always()
        continue-on-error: true
        run: |
          if [ -d test-results/allure-result ] || [ -d test-results/allure-results ]; then
            npm run generate:allure || true
          else
            echo "No Allure raw results to generate"
          fi

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-merge-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Email report zip to SEND_EMAIL_TO_USER_EMAIL
        if: always()
        continue-on-error: true
        env:
          RUN_ID: pre-merge-${{ github.run_id }}-${{ github.run_attempt }}
          EMAIL_REPORT_STATUS: "pre-merge api-smoke=${{ steps.api-smoke.outcome }}"
        run: |
          if [ ! -f src/config/environment/.env ]; then
            echo "No .env from ENV_FILE secret — cannot email reports."
            exit 0
          fi
          npm run reports:email
