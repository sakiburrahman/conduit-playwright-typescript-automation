name: Pre-Merge Check

on:
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: pre-merge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  ENVIRONMENT: DEV
  DYNAMIC_USER: "true"
  PARALLEL: "true"
  WORKERS: "2"
  HEADLESS: "true"
  OPEN_REPORTS: "false"
  CI: "true"
  DEV_BASEURL: https://conduit.bondaracademy.com
  DEV_API_BASE_URL: https://conduit-api.bondaracademy.com

jobs:
  pre-merge:
    name: Pre-Merge Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run API smoke
        run: npm run test:dev:api

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-merge-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
